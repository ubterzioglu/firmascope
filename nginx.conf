map $request_uri $x_robots_tag {
    default "index, follow";
    ~^/(admin|giris|sirket-yonetimi|sirket-oner)(/|$) "noindex, nofollow";
}

server {
    listen 80;
    server_name www.firmascope.com;
    return 301 https://firmascope.com$request_uri;
}

server {
    listen 80;
    server_name firmascope.com _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    location = /yasal {
        return 301 /kullanim-sartlari;
    }

    location / {
        add_header X-Robots-Tag $x_robots_tag always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
